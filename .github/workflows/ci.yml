name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (gateway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: gateway/go.sum

      # The gateway embeds the three SPAs via //go:embed all:webroot.
      # `make embed-webroot` populates that directory before any go
      # command runs — without it, embed.go sees an empty dir and the
      # SPAs serve 404 (the binary still compiles, but tests would
      # exercise an unrealistic surface).
      - name: Embed SPAs into webroot
        run: make embed-webroot

      - name: go vet
        working-directory: gateway
        run: go vet ./...

      - name: go build
        working-directory: gateway
        run: go build ./...

      - name: go test
        working-directory: gateway
        run: go test ./...

  web:
    name: Web (site + portal + admin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

  docs:
    name: Docs (cross-link)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check AGENTS.md targets exist
        run: |
          grep -oE '\]\(\./[^)]+\)' AGENTS.md | sed -E 's|\]\(\./([^)]+)\)|\1|' | while read -r path; do
            if [ ! -e "$path" ]; then
              echo "::error file=AGENTS.md::broken link: $path"
              exit 1
            fi
          done

  # Build smoke for every PR + push — proves the Dockerfile + build
  # context still works without touching Docker Hub.
  docker-build:
    name: Docker build (gateway)
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/Dockerfile
          push: false
          tags: livepeer-video-gateway:ci

  # Publish multi-arch image to Docker Hub on v* tag pushes only.
  # Requires DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets (org or repo
  # scope). Pushes tztcloud/livepeer-video-gateway:<tag> AND :latest.
  docker-publish:
    name: Docker publish (gateway)
    runs-on: ubuntu-latest
    needs: [go, web, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            tztcloud/livepeer-video-gateway:${{ steps.meta.outputs.version }}
            tztcloud/livepeer-video-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
