# Livepeer Video Gateway — root compose.
#
# Default `docker compose up` brings up:
#   - db                 (postgres:16-alpine)
#   - minio              (S3-compatible object store for VOD + live HLS)
#   - minio-bootstrap    (one-shot: waits for minio, creates bucket + access key)
#   - minio-cors         (one-shot: applies CORS policy for browser-direct PUTs)
#   - gateway            (build from ./gateway/Dockerfile)
#
# The two Livepeer daemons live behind the `livepeer` profile. The
# gateway boots fine without them (`/v1/*` returns 503 until they're
# reachable). Bring them up with:
#   docker compose --profile livepeer up -d
#
# Capability workers (abr-runner, transcode-runner, capability-broker)
# are external to this repository. The gateway expects on-chain
# capability providers by default.
#
# The three Lit SPAs run independently via `node dev-server.js` in
# each web/ subdir; they're not in this stack.

services:
  db:
    image: postgres:16-alpine
    container_name: video-gateway-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-video_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-video_gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres-dev-password}
    volumes:
      - video-gateway-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video_gateway}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-latest}
    container_name: video-gateway-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dev-password}
      # MinIO sets CORS server-wide via env (no PutBucketCors API);
      # this is wide-open in dev to match the SPAs at :3000/:3001/:3002
      # and any browser-direct presigned PUTs. Override in prod.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-*}
    volumes:
      - video-gateway-minio-data:/data
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    command: ["server", "--address", ":9000", "--console-address", ":9001", "/data"]

  minio-bootstrap:
    image: minio/mc:latest
    container_name: video-gateway-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-dev-password}
      S3_BUCKET: ${S3_BUCKET:-lvp-video-ingest}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-video-gateway}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-video-gateway-dev-secret}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        # Bucket + anonymous read for HLS playback.
        mc mb --ignore-existing local/$$S3_BUCKET
        mc anonymous set download local/$$S3_BUCKET || true
        # Gateway IAM user — used for static-credential operations (VOD
        # ABR uploads) AND for calling STS AssumeRole (per-session live
        # uploads). The 'readwrite' built-in policy gives s3:* on /*,
        # which covers both. MinIO allows STS AssumeRole for any
        # authenticated user; the inline policy passed at AssumeRole
        # time narrows the result to a session's prefix.
        if ! mc admin user info local "$$S3_ACCESS_KEY_ID" >/dev/null 2>&1; then
          mc admin user add local "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"
        fi
        mc admin policy attach local readwrite --user "$$S3_ACCESS_KEY_ID" || true
        echo "minio-bootstrap: bucket $$S3_BUCKET ready, access key $$S3_ACCESS_KEY_ID provisioned"
    restart: "no"

  # NOTE: MinIO sets CORS via MINIO_API_CORS_ALLOW_ORIGIN env (server-side,
  # not via a PutBucketCors API call). See the minio service above. No
  # separate bootstrap step required.

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: livepeer-video-gateway:${GATEWAY_TAG:-dev}
    container_name: video-gateway
    depends_on:
      db:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      # ── server ──
      PORT: "4000"
      HOST: "0.0.0.0"
      BASE_URL: ${BASE_URL:-http://localhost:4000}
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-http://localhost:3000}
      PUBLIC_PORTAL_URL: ${PUBLIC_PORTAL_URL:-http://localhost:3001}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # ── data ──
      DATABASE_URL: postgres://${POSTGRES_USER:-video_gateway}:${POSTGRES_PASSWORD:-postgres-dev-password}@db:5432/${POSTGRES_DB:-video_gateway}?sslmode=disable

      # ── SaaS shell auth ──
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      API_KEY_HASH_PEPPER: ${API_KEY_HASH_PEPPER:-}
      IP_HASH_PEPPER: ${IP_HASH_PEPPER:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}

      # ── email (optional) ──
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-Livepeer Video Gateway <noreply@example.com>}

      # ── object store ──
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-lvp-video-ingest}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-video-gateway}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-video-gateway-dev-secret}
      S3_PRESIGN_TTL_SECONDS: ${S3_PRESIGN_TTL_SECONDS:-3600}

      # ── Livepeer plumbing ──
      LIVEPEER_PAYER_DAEMON_SOCKET: /var/run/livepeer/payer-daemon.sock
      LIVEPEER_RESOLVER_SOCKET: ${LIVEPEER_RESOLVER_SOCKET:-/var/run/livepeer/service-registry.sock}
      REGISTRY_REFRESH_INTERVAL_MS: ${REGISTRY_REFRESH_INTERVAL_MS:-60000}
      ABR_CAPABILITY: ${ABR_CAPABILITY:-video:transcode.abr}
      LIVE_CAPABILITY: ${LIVE_CAPABILITY:-video:transcode.live}
      # Offering label orchs advertise for the live-session-gateway-ingest@v0
      # mode under capability video:transcode.live.
      LIVE_GATEWAY_INGEST_OFFERING: ${LIVE_GATEWAY_INGEST_OFFERING:-gateway-ingest}

      # ── live-session-remote-runner@v0 tuning ──
      # Defaults match the runner team's approved values; override via
      # .env for per-deployment policy. Set LIVE_RECONCILE_INTERVAL_SECS=0
      # to disable the background reconciler (on-GET reconciliation in
      # handlers_v1.go still applies in that mode).
      LIVE_IDLE_TIMEOUT_SECS: ${LIVE_IDLE_TIMEOUT_SECS:-120}
      LIVE_RECONCILE_INTERVAL_SECS: ${LIVE_RECONCILE_INTERVAL_SECS:-30}
      LIVE_TOPUP_RUNWAY_THRESHOLD_SECS: ${LIVE_TOPUP_RUNWAY_THRESHOLD_SECS:-60}
      LIVE_TOPUP_FUND_SECS: ${LIVE_TOPUP_FUND_SECS:-60}

      # ── live-session-gateway-ingest@v0 (plan 0003) ──
      # Gateway-owned RTMP ingest. Set LIVE_RTMP_PORT to a non-zero
      # value to enable the listener (and publish the port below).
      LIVE_RTMP_PORT: ${LIVE_RTMP_PORT:-0}
      LIVE_PLAYBACK_BASE_URL: ${LIVE_PLAYBACK_BASE_URL:-}
      LIVE_S3_CREDENTIAL_TTL_HOURS: ${LIVE_S3_CREDENTIAL_TTL_HOURS:-4}

      # ── /v1/* rate limit ──
      V1_RATE_LIMIT_PER_MINUTE: ${V1_RATE_LIMIT_PER_MINUTE:-60}
      V1_RATE_LIMIT_BURST: ${V1_RATE_LIMIT_BURST:-30}
    volumes:
      - livepeer-run:/var/run/livepeer
    ports:
      - "${GATEWAY_HOST_PORT:-4000}:4000"
      # RTMP ingest port for live-session-gateway-ingest@v0 (plan 0003).
      # Published only when LIVE_RTMP_PORT is non-zero. Docker requires a
      # static port mapping at compose-parse time; this maps host:1935 ↔
      # container:1935 by default. If you want a different host port,
      # override LIVE_RTMP_HOST_PORT.
      - "${LIVE_RTMP_HOST_PORT:-1935}:${LIVE_RTMP_PORT:-1935}"
    restart: unless-stopped

  service-registry-daemon:
    image: tztcloud/livepeer-service-registry-daemon:${LIVEPEER_REGISTRY_DAEMON_TAG:-v1.3.1}
    container_name: video-gateway-resolver
    profiles: [livepeer]
    restart: unless-stopped
    environment:
      CHAIN_RPC: ${CHAIN_RPC:-}
      CHAIN_ID: ${CHAIN_ID:-42161}
      LIVEPEER_RESOLVER_SOCKET: /var/run/livepeer/service-registry.sock
    command:
      - --mode=resolver
      - --socket=/var/run/livepeer/service-registry.sock
      - --store-path=/var/lib/livepeer/registry-cache.db
      - --chain-rpc=${CHAIN_RPC:-}
      - --chain-id=${CHAIN_ID:-42161}
      - --controller-address=${CONTROLLER_ADDRESS:-0xD8E8328501E9645d16Cf49539efC04f734606ee4}
      - --ai-service-registry-address=${AI_SERVICE_REGISTRY_ADDRESS:-}
      - --discovery=chain
      - --round-poll-interval=${ROUND_POLL_INTERVAL:-120s}
      - --cache-manifest-ttl=${CACHE_MANIFEST_TTL:-5m}
      - --manifest-max-bytes=${MANIFEST_MAX_BYTES:-1048576}
      - --manifest-fetch-timeout=${MANIFEST_FETCH_TIMEOUT:-5s}
      - --max-stale=${MAX_STALE:-30m}
      - --reject-unsigned=true
      - --log-level=${REGISTRY_LOG_LEVEL:-info}
      - --log-format=${REGISTRY_LOG_FORMAT:-json}
      - --metrics-listen=:${REGISTRY_METRICS_PORT:-9095}
    volumes:
      - livepeer-run:/var/run/livepeer
      - video-gateway-registry-cache:/var/lib/livepeer

  payer-daemon:
    image: tztcloud/livepeer-payment-daemon:${LIVEPEER_PAYER_DAEMON_TAG:-v1.3.1}
    container_name: video-gateway-payer
    profiles: [livepeer]
    restart: unless-stopped
    environment:
      CHAIN_RPC: ${CHAIN_RPC:-}
      CHAIN_ID: ${CHAIN_ID:-42161}
      LIVEPEER_PAYER_SOCKET: /var/run/livepeer/payer-daemon.sock
      LIVEPEER_PAYER_KEYSTORE_PATH: /etc/livepeer/keystore.json
      LIVEPEER_PAYER_KEYSTORE_PASSWORD_FILE: /etc/livepeer/keystore-password
    command:
      - --mode=sender
      - --socket=/var/run/livepeer/payer-daemon.sock
      - --chain-rpc=${CHAIN_RPC:-}
      - --keystore-path=/etc/livepeer/keystore.json
      - --keystore-password-file=/etc/livepeer/keystore-password
    volumes:
      - livepeer-run:/var/run/livepeer
      - ${LIVEPEER_KEYSTORE_DIR:-./.dev/keystore}:/etc/livepeer:ro

volumes:
  video-gateway-pgdata:
  video-gateway-minio-data:
  video-gateway-registry-cache:
  livepeer-run:
